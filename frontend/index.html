<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkeytype-C | Typing Tutor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <div id="logo">monkeytype-c</div>
            <div id="modes">
                <span>timed</span>
                <span>words</span>
                <span>quote</span>
            </div>
        </header>

        <main>
            <div id="stats-bar">
                <div class="stat"><span id="timer">30</span>s</div>
                <div class="stat"><span id="wpm">0</span> wpm</div>
                <div class="stat"><span id="accuracy">100</span>% acc</div>
            </div>

            <div id="typing-container">
                <div id="sentence-wrapper">
                    <!-- Spans generated by JS -->
                </div>
                <div id="cursor"></div>
            </div>
        </main>

        <footer id="footer">
            <div id="controls">
                <button id="restart-btn">Restart [Enter]</button>
            </div>
            <div id="tips">
                <span>tab + enter - restart test</span>
            </div>
        </footer>

        <div id="results" class="hidden">
            <h2>Results</h2>
            <div class="result-grid">
                <div class="result-box">
                    <span class="label">wpm</span>
                    <span id="final-wpm" class="value">0</span>
                </div>
                <div class="result-box">
                    <span class="label">acc</span>
                    <span id="final-acc" class="value">0%</span>
                </div>
            </div>
            <button id="play-again">Play Again</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
